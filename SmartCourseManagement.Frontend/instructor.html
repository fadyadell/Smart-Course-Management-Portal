<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructor Panel - Smart Course Portal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar glass">
        <div class="nav-logo">SmartPortal</div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="courses.html">Courses</a></li>
            <li><a href="instructor.html">Instructor</a></li>
            <li><a href="#" onclick="api.auth.logout()">Logout</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Instructor Profile</h1>
        
        <div class="auth-card glass" style="max-width: 600px; margin: 2rem 0;">
            <h3>Update Profile Information</h3>
            <form id="profileForm" style="margin-top: 1.5rem;">
                <div class="form-group">
                    <label>Biography</label>
                    <textarea id="bio" class="glass" style="width: 100%; min-height: 100px; padding: 1rem; color: white;"></textarea>
                </div>
                <div class="form-group">
                    <label>Office Location</label>
                    <input type="text" id="office">
                </div>
                <button type="submit">Update Information</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const user = api.auth.getUser();
        if (!user || user.role !== 'Instructor') {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                biography: document.getElementById('bio').value,
                officeLocation: document.getElementById('office').value
            };

            try {
                await api.request('/instructors/profile', {
                    method: 'PUT',
                    body: JSON.stringify(data)
                });
                alert('Profile updated!');
            } catch (err) {
                alert(err.message);
            }
        });
    </script>
</body>
</html>
