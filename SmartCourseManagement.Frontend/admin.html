<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Smart Course Portal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar glass">
        <div class="nav-logo">SmartPortal</div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="courses.html">Courses</a></li>
            <li><a href="admin.html">Admin</a></li>
            <li><a href="#" onclick="api.auth.logout()">Logout</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Admin Control Panel</h1>
        
        <div class="dashboard-grid">
            <div class="course-card glass">
                <h3>Create New Course</h3>
                <form id="createCourseForm">
                    <div class="form-group">
                        <label>Course Title</label>
                        <input type="text" id="title" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" id="desc" required>
                    </div>
                    <div class="form-group">
                        <label>Credits</label>
                        <input type="number" id="credits" min="1" max="10" required>
                    </div>
                    <div class="form-group">
                        <label>Instructor ID</label>
                        <input type="number" id="instrId" required>
                    </div>
                    <button type="submit">Create Course</button>
                </form>
            </div>

            <div class="course-card glass">
                <h3>System Statistics</h3>
                <div id="stats" style="margin-top: 1rem;">
                    <p>Loading stats...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const user = api.auth.getUser();
        if (!user || user.role !== 'Admin') {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('createCourseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                title: document.getElementById('title').value,
                description: document.getElementById('desc').value,
                credits: parseInt(document.getElementById('credits').value),
                instructorId: parseInt(document.getElementById('instrId').value)
            };

            try {
                await api.courses.create(data);
                alert('Course created successfully!');
                e.target.reset();
            } catch (err) {
                alert(err.message);
            }
        });
    </script>
</body>
</html>
