<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Course Portal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card glass">
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Join the smart learning portal</p>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••" minlength="6">
                </div>

                <div class="form-group">
                    <label for="role">I am a...</label>
                    <select id="role" required>
                        <option value="Student">Student</option>
                        <option value="Instructor">Instructor</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                
                <button type="submit" id="regBtn">Register</button>
            </form>
            
            <div class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </div>
            <div id="message" style="margin-top: 1rem; text-align: center; color: #ef4444;"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        if (api.auth.isAuthenticated()) {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };
            const btn = document.getElementById('regBtn');
            const msg = document.getElementById('message');

            btn.disabled = true;
            btn.innerText = 'Creating account...';
            msg.innerText = '';
            msg.style.color = '#ef4444';

            try {
                await api.auth.register(userData);
                msg.style.color = '#10b981';
                msg.innerText = 'Account created! Redirecting to login...';
                setTimeout(() => window.location.href = 'login.html', 2000);
            } catch (err) {
                msg.innerText = err.message;
                btn.disabled = false;
                btn.innerText = 'Register';
            }
        });
    </script>
</body>
</html>
