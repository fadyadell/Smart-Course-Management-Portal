<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Smart Course Management Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body class="auth-page">

<div class="auth-card">
    <div class="auth-logo">
        <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to your SmartCourse account</p>
    </div>

    <form id="login-form" novalidate>
        <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <div class="input-group">
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" id="email" class="form-control" placeholder="you@example.com" autocomplete="email" required>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="input-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="password" class="form-control" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="current-password" required>
                <button type="button" class="toggle-password" onclick="togglePwd('password', this)" tabindex="-1">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg mt-1">
            <i class="fas fa-sign-in-alt me-2"></i>Sign In
        </button>
    </form>

    <p class="text-center mt-3" style="font-size:.875rem; color:var(--text-muted);">
        Don't have an account? <a href="register.html" style="font-weight:600;">Create one</a>
    </p>
    <p class="text-center mt-2" style="font-size:.875rem;">
        <a href="index.html" style="color:var(--text-muted);"><i class="fas fa-arrow-left me-1"></i>Back to Home</a>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/helpers/validators.js"></script>
<script src="js/helpers/formatters.js"></script>
<script>
    if (Auth.isAuthenticated()) window.location.href = 'dashboard.html';
    function togglePwd(id, btn) {
        const input = document.getElementById(id);
        const isText = input.type === 'text';
        input.type = isText ? 'password' : 'text';
        btn.querySelector('i').className = isText ? 'fas fa-eye' : 'fas fa-eye-slash';
    }
</script>
<script src="js/pages/login.js"></script>
</body>
</html>
