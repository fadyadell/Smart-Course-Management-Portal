<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Smart Course Management Portal</title>
    <link rel="stylesheet" href="css/dark-theme.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;">
        <div class="auth-card animate-scale-in">
            <div class="text-center mb-8">
                <div style="font-size:2.5rem;margin-bottom:0.5rem;"><i class="fas fa-university" style="color:var(--primary-color)"></i></div>
                <h2>Welcome Back</h2>
                <p class="text-muted" style="margin-top:0.25rem;font-size:0.9rem;">Sign in to your account to continue</p>
            </div>

            <div id="error-msg" class="hidden" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:0.75rem 1rem;margin-bottom:1rem;color:#fca5a5;font-size:0.875rem;"></div>

            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" required placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••" autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%" id="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <hr class="divider">
            <p class="text-center text-muted" style="font-size:0.875rem;">
                Don't have an account? <a href="/register.html">Create one here</a>
            </p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Redirect if already logged in
        if (Auth.isAuthenticated()) {
            window.location.href = '/dashboard.html';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email    = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const btn      = document.getElementById('login-btn');
            const errMsg   = document.getElementById('error-msg');

            errMsg.classList.add('hidden');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner spinner-sm spinner-inline"></span> Signing in...';

            try {
                await Auth.login(email, password);
                window.location.href = '/dashboard.html';
            } catch (err) {
                errMsg.textContent = err.message || 'Invalid email or password.';
                errMsg.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            }
        });
    </script>
</body>
</html>
