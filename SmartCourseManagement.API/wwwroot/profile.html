<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile – Smart Course Management Portal</title>
    <link rel="stylesheet" href="css/dark-theme.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container nav-content">
            <div class="logo"><i class="fas fa-university"></i> SmartCourse</div>
            <nav class="nav-links">
                <a href="/dashboard.html">Dashboard</a>
                <a href="/courses.html">Courses</a>
                <a href="/profile.html" class="active">Profile</a>
                <button class="btn btn-outline btn-sm" onclick="Auth.logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </nav>
        </div>
    </header>

    <main class="container" style="padding-top:2rem;padding-bottom:4rem;max-width:700px;">
        <div class="animate-fade-in">
            <h1 class="section-title mb-6">My Profile</h1>

            <div class="glass-card text-center mb-6">
                <div class="profile-avatar" id="profile-avatar">?</div>
                <h2 id="profile-name-display">–</h2>
                <span class="badge mt-2" id="profile-role-display">–</span>
                <p class="text-muted mt-2" id="profile-email-display">–</p>
            </div>

            <div class="glass-card mb-6">
                <h3 class="mb-6"><i class="fas fa-user-edit" style="color:var(--primary-color)"></i> Account Information</h3>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="profile-name" readonly>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="profile-email" readonly>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <input type="text" id="profile-role" readonly>
                </div>
                <p class="text-muted" style="font-size:0.8rem;margin-top:0.5rem;">
                    <i class="fas fa-info-circle"></i>
                    Profile information is managed via your account settings. Contact an admin to change your role.
                </p>
            </div>

            <div class="glass-card" id="enrollment-section" style="display:none;">
                <h3 class="mb-4"><i class="fas fa-book-open" style="color:var(--primary-color)"></i> My Enrollments</h3>
                <div id="enrollment-list"><div class="spinner"></div></div>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const user = Auth.requireAuth();
        if (user) {
            // Populate profile fields
            document.getElementById('profile-name').value   = user.name;
            document.getElementById('profile-email').value  = user.email;
            document.getElementById('profile-role').value   = user.role;
            document.getElementById('profile-name-display').textContent  = user.name;
            document.getElementById('profile-email-display').textContent = user.email;
            document.getElementById('profile-role-display').textContent  = user.role;

            // Avatar: initials
            const initials = user.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2);
            document.getElementById('profile-avatar').textContent = initials;

            // Show enrollments for students
            if (user.role === 'Student') {
                const section = document.getElementById('enrollment-section');
                section.style.display = 'block';
                loadEnrollments();
            }
        }

        async function loadEnrollments() {
            const list = document.getElementById('enrollment-list');
            try {
                const enrollments = await Api.get('/enrollments/my-enrollments');
                if (!enrollments || !enrollments.length) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon"><i class="fas fa-book"></i></div>
                            <p>No enrollments yet. <a href="/courses.html">Browse courses</a></p>
                        </div>`;
                    return;
                }
                list.innerHTML = `
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Course</th>
                                    <th>Enrolled Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${enrollments.map(e => `
                                    <tr>
                                        <td><strong>${Utils.escapeHtml(e.courseTitle || 'Course')}</strong></td>
                                        <td>${Utils.formatDate(e.enrollmentDate)}</td>
                                        <td>
                                            <button class="btn btn-danger btn-sm" onclick="unenroll(${e.id})">
                                                <i class="fas fa-times"></i> Drop
                                            </button>
                                        </td>
                                    </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>`;
            } catch (err) {
                list.innerHTML = `<p style="color:var(--error-color)">${Utils.escapeHtml(err.message)}</p>`;
            }
        }

        async function unenroll(id) {
            const confirmed = await UI.confirm('Drop Course', 'Are you sure you want to drop this course?');
            if (!confirmed) return;
            try {
                await Api.delete(`/enrollments/${id}`);
                UI.toast('Successfully dropped course.', 'success');
                loadEnrollments();
            } catch (err) {
                UI.toast(err.message, 'error');
            }
        }
    </script>
</body>
</html>
