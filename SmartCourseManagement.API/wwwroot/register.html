<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – Smart Course Management Portal</title>
    <link rel="stylesheet" href="css/dark-theme.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;">
        <div class="auth-card animate-scale-in" style="max-width:500px;">
            <div class="text-center mb-8">
                <div style="font-size:2.5rem;margin-bottom:0.5rem;"><i class="fas fa-user-graduate" style="color:var(--primary-color)"></i></div>
                <h2>Create Account</h2>
                <p class="text-muted" style="margin-top:0.25rem;font-size:0.9rem;">Join the Smart Course Management Portal</p>
            </div>

            <div id="error-msg" class="hidden" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:0.75rem 1rem;margin-bottom:1rem;color:#fca5a5;font-size:0.875rem;"></div>

            <form id="register-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" required placeholder="Dr. Jane Smith" minlength="2" maxlength="100">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="reg-email" required placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Password <span class="text-muted">(min. 6 characters)</span></label>
                    <input type="password" id="reg-password" required placeholder="••••••••" minlength="6" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="reg-role" required>
                        <option value="">— Select your role —</option>
                        <option value="Student">Student</option>
                        <option value="Instructor">Instructor</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%" id="register-btn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <hr class="divider">
            <p class="text-center text-muted" style="font-size:0.875rem;">
                Already have an account? <a href="/login.html">Sign in here</a>
            </p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        if (Auth.isAuthenticated()) {
            window.location.href = '/dashboard.html';
        }

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name     = document.getElementById('reg-name').value.trim();
            const email    = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const role     = document.getElementById('reg-role').value;
            const btn      = document.getElementById('register-btn');
            const errMsg   = document.getElementById('error-msg');

            errMsg.classList.add('hidden');

            if (!role) {
                errMsg.textContent = 'Please select a role.';
                errMsg.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner spinner-sm spinner-inline"></span> Creating account...';

            try {
                await Auth.register(name, email, password, role);
                window.location.href = '/dashboard.html';
            } catch (err) {
                errMsg.textContent = err.message || 'Registration failed.';
                errMsg.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
            }
        });
    </script>
</body>
</html>
