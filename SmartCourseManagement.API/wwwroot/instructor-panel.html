<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructor Panel – Smart Course Management Portal</title>
    <link rel="stylesheet" href="css/dark-theme.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container nav-content">
            <div class="logo"><i class="fas fa-university"></i> SmartCourse</div>
            <nav class="nav-links">
                <a href="/dashboard.html">Dashboard</a>
                <a href="/courses.html">Courses</a>
                <a href="/instructor-panel.html" class="active">My Panel</a>
                <a href="/profile.html">Profile</a>
                <button class="btn btn-outline btn-sm" onclick="Auth.logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </nav>
        </div>
    </header>

    <main class="container" style="padding-top:2rem;padding-bottom:4rem;">
        <div class="section-header mb-6">
            <h1 class="section-title"><i class="fas fa-chalkboard-teacher" style="color:var(--primary-color)"></i> Instructor Panel</h1>
            <button class="btn btn-primary" onclick="showCreateModal()">
                <i class="fas fa-plus"></i> Create Course
            </button>
        </div>

        <div class="glass-card mb-6">
            <h3 class="mb-4">My Courses</h3>
            <div id="my-courses"><div class="spinner"></div></div>
        </div>
    </main>

    <!-- Create Course Modal -->
    <div id="create-modal" class="modal-overlay hidden">
        <div class="modal-box glass-card" style="max-width:500px;">
            <h3 class="mb-6"><i class="fas fa-plus"></i> Create New Course</h3>
            <form id="create-course-form">
                <div class="form-group">
                    <label>Course Title</label>
                    <input type="text" id="new-title" required placeholder="e.g. Advanced Python Programming">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="new-description" rows="3" placeholder="Course description..."></textarea>
                </div>
                <div class="form-group">
                    <label>Credits (1–10)</label>
                    <input type="number" id="new-credits" required min="1" max="10" value="3">
                </div>
                <div id="instructor-id-field" class="form-group">
                    <label>Your Instructor Profile ID</label>
                    <input type="number" id="new-instructor" required min="1" placeholder="Find your ID in /instructors">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" onclick="hideCreateModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Course</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const user = Auth.requireAuth(['Instructor', 'Admin']);
        if (user) loadMyCourses();

        async function loadMyCourses() {
            const el = document.getElementById('my-courses');
            try {
                const result = await Api.get('/courses/paged?page=1&pageSize=50');
                const courses = (result.data || []).filter(c =>
                    c.instructorName && user && c.instructorName.toLowerCase().includes((user.name || '').toLowerCase())
                );
                if (!courses.length) {
                    el.innerHTML = `<div class="empty-state">
                        <div class="empty-icon"><i class="fas fa-book-open"></i></div>
                        <p>You haven't created any courses yet.</p>
                        <button class="btn btn-primary mt-4" onclick="showCreateModal()">
                            <i class="fas fa-plus"></i> Create Your First Course
                        </button>
                    </div>`;
                    return;
                }
                el.innerHTML = `
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr><th>#</th><th>Title</th><th>Credits</th><th>Actions</th></tr>
                            </thead>
                            <tbody>
                                ${courses.map(c => `
                                    <tr>
                                        <td>${c.id}</td>
                                        <td>${Utils.escapeHtml(c.title)}</td>
                                        <td>${c.credits}</td>
                                        <td style="display:flex;gap:0.5rem;">
                                            <button class="btn btn-danger btn-sm" onclick="deleteCourse(${c.id})">
                                                <i class="fas fa-trash"></i> Delete
                                            </button>
                                        </td>
                                    </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>`;
            } catch (err) {
                el.innerHTML = `<p style="color:var(--error-color)">${Utils.escapeHtml(err.message)}</p>`;
            }
        }

        async function deleteCourse(id) {
            const confirmed = await UI.confirm('Delete Course', 'Are you sure you want to delete this course?');
            if (!confirmed) return;
            try {
                await Api.delete(`/courses/${id}`);
                UI.toast('Course deleted.', 'success');
                loadMyCourses();
            } catch (err) {
                UI.toast(err.message, 'error');
            }
        }

        function showCreateModal() {
            document.getElementById('create-modal').classList.remove('hidden');
        }
        function hideCreateModal() {
            document.getElementById('create-modal').classList.add('hidden');
            document.getElementById('create-course-form').reset();
        }

        document.getElementById('create-course-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await Api.post('/courses', {
                    title:        document.getElementById('new-title').value,
                    description:  document.getElementById('new-description').value,
                    credits:      parseInt(document.getElementById('new-credits').value),
                    instructorId: parseInt(document.getElementById('new-instructor').value)
                });
                UI.toast('Course created!', 'success');
                hideCreateModal();
                loadMyCourses();
            } catch (err) {
                UI.toast(err.message, 'error');
            }
        });
    </script>
</body>
</html>
