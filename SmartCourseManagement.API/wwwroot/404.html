<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Page Not Found</title>
    <link rel="stylesheet" href="css/dark-theme.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="error-page animate-fade-in">
        <div class="error-code">404</div>
        <h2 style="margin-bottom:0.5rem;">Page Not Found</h2>
        <p class="text-muted" style="margin-bottom:2rem;max-width:400px;">
            Oops! The page you're looking for doesn't exist or has been moved.
        </p>
        <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
            <a href="/index.html" class="btn btn-primary"><i class="fas fa-home"></i> Go Home</a>
            <a href="javascript:history.back()" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Go Back</a>
        </div>
    </div>
</body>
</html>
